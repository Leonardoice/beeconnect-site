<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review</title>
<meta name="robots" content="noindex, nofollow">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/icon.png">
<script src="config.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8f9fa;color:#1a1a2e;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.review-card{background:#fff;border-radius:20px;max-width:440px;width:100%;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.review-header{padding:32px 24px 24px;text-align:center}
.review-header img{width:72px;height:72px;border-radius:16px;margin-bottom:12px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.review-header .biz-icon{width:72px;height:72px;border-radius:16px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:40px}
.review-header h1{font-size:22px;font-weight:800;margin-bottom:4px}
.review-header .prompt{font-size:14px;color:#666}
.review-body{padding:0 24px 24px}
.star-section{text-align:center;margin-bottom:24px}
.star-section p{font-size:13px;color:#888;margin-bottom:12px}
.stars{display:flex;gap:8px;justify-content:center}
.stars button{background:none;border:none;cursor:pointer;padding:4px;transition:transform .15s}
.stars button:hover{transform:scale(1.15)}
.stars button svg{width:44px;height:44px;transition:all .15s}
.star-fill{fill:#e0e0e0;stroke:#ccc;stroke-width:1}
.star-active .star-fill{fill:#FBBF24;stroke:#F59E0B}
.comment-section{display:none;margin-bottom:20px}
.comment-section textarea{width:100%;padding:14px;border:2px solid #e8e8e8;border-radius:12px;font-size:14px;font-family:inherit;resize:none;min-height:80px;outline:none}
.comment-section textarea:focus{border-color:var(--primary)}
.platform-section{display:none}
.platform-section p{font-size:13px;font-weight:600;color:#333;margin-bottom:12px;text-align:center}
.platform-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;margin-bottom:10px;font-family:inherit;transition:opacity .2s}
.platform-btn:hover{opacity:.9}
.skip-btn{display:block;text-align:center;color:#aaa;font-size:13px;margin-top:12px;cursor:pointer;background:none;border:none;font-family:inherit}
.skip-btn:hover{color:#666}
.thank-you{display:none;text-align:center;padding:40px 24px}
.thank-you .ty-icon{font-size:64px;margin-bottom:16px}
.thank-you h2{font-size:22px;font-weight:800;margin-bottom:8px}
.thank-you p{font-size:14px;color:#666}
.review-footer{padding:12px 24px;background:#f8f9fa;border-top:1px solid #f0f0f0;text-align:center}
.review-footer a{font-size:11px;color:#bbb;text-decoration:none;font-weight:600}
.review-footer a span{color:#888}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}</style>
</head>
<body>

<div class="review-card">
  
  <div class="review-header" id="reviewHeader">
    <img src="assets/icon.png" alt="" onerror="this.style.display='none';document.getElementById('bizIcon').style.display='flex'">
    <div class="biz-icon" id="bizIcon" style="display:none"></div>
    <h1 id="bizName">Your Business</h1>
    <div class="prompt" id="reviewPrompt">How was your experience?</div>
  </div>

  
  <div class="review-body" id="ratingView">
    <div class="star-section">
      <p>Tap a star to rate</p>
      <div class="stars" id="starsContainer"></div>
    </div>

    <div class="comment-section" id="commentSection">
      <textarea id="commentText" placeholder="Tell us more (optional)..." rows="3"></textarea>
    </div>

    <div class="platform-section" id="platformSection">
      <p>Leave your review on:</p>
      <div id="platformButtons"></div>
      <button class="skip-btn" onclick="submitDirect()">Just submit my rating</button>
    </div>
  </div>

  
  <div class="thank-you" id="thankYou">
    <div class="ty-icon">&#x1F389;</div>
    <h2>Thank You!</h2>
    <p id="thankYouMsg">Your feedback means the world to us.</p>
  </div>

  <div class="review-footer">
    <a href="#">Powered by <span>RepKit</span></a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>/* (c) 2026 OpsyncHQ. All rights reserved. Unauthorized use, reproduction, or distribution is strictly prohibited. */
let selectedRating=0;function init(){const ind=APP_CONFIG.getIndustry();document.getElementById('bizName').textContent=APP_CONFIG.businessName;document.getElementById('reviewPrompt').textContent=ind.prompt;const bizIcon=document.getElementById('bizIcon');bizIcon.textContent=ind.icon;bizIcon.style.backgroundColor=APP_CONFIG.colors.primaryLight;document.getElementById('reviewHeader').querySelector('h1').style.color=APP_CONFIG.colors.primary;document.documentElement.style.setProperty('--primary',APP_CONFIG.colors.primary);const container=document.getElementById('starsContainer');for(let i=1;i<=5;i++){const btn=document.createElement('button');btn.innerHTML=`<svg viewBox="0 0 24 24"><path class="star-fill"d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>`;btn.dataset.rating=i;btn.onclick=()=>selectRating(i);btn.onmouseenter=()=>highlightStars(i);btn.onmouseleave=()=>highlightStars(selectedRating);container.appendChild(btn);}
const platforms=APP_CONFIG.getEnabledPlatforms();const pContainer=document.getElementById('platformButtons');platforms.forEach(p=>{const btn=document.createElement('button');btn.className='platform-btn';btn.style.backgroundColor=p.color;btn.textContent=`Leave a ${p.name}Review`;btn.onclick=()=>openPlatform(p);pContainer.appendChild(btn);});const params=new URLSearchParams(window.location.search);const name=params.get('name');if(name){document.getElementById('thankYouMsg').textContent=`Thank you,${name}!Your feedback helps ${APP_CONFIG.businessName}grow.`;}}
function highlightStars(n){const stars=document.querySelectorAll('#starsContainer button');stars.forEach((s,i)=>s.classList.toggle('star-active',i<n));}
function selectRating(n){selectedRating=n;highlightStars(n);document.getElementById('commentSection').style.display='block';document.getElementById('platformSection').style.display='block';}
function openPlatform(platform){if(platform.url){showToast('Opening '+platform.name+'...');logReview(selectedRating,platform.key);setTimeout(()=>{window.open(platform.url,'_blank');showThankYou();},500);}else{showToast(platform.name+' review link not configured');}}
function submitDirect(){logReview(selectedRating,'direct');showThankYou();}
function showThankYou(){document.getElementById('ratingView').style.display='none';document.getElementById('thankYou').style.display='block';}
function logReview(rating,platform){const data={rating,platform,comment:document.getElementById('commentText').value,timestamp:new Date().toISOString(),requestCode:new URLSearchParams(window.location.search).get('code')||null,};if(APP_CONFIG.isDemoMode){console.log('[RepKit Demo] Review logged:',data);return;}
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
init();</script>

</body>
